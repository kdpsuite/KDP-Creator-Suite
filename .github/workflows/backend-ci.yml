name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend-api/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend-api/kdp-creator-api
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort

      - name: Run Black (code formatter check)
        working-directory: backend-api/kdp-creator-api
        run: black --check src/ || true

      - name: Run isort (import sorter check)
        working-directory: backend-api/kdp-creator-api
        run: isort --check-only src/ || true

      - name: Run Flake8
        working-directory: backend-api/kdp-creator-api
        run: flake8 src/ --max-line-length=120 --extend-ignore=E203,W503 || true

      - name: Run Pylint
        working-directory: backend-api/kdp-creator-api
        run: pylint src/ --disable=C0111,C0103,R0913,R0914 || true

  security:
    runs-on: ubuntu-latest
    name: Security Checks

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security linter)
        working-directory: backend-api/kdp-creator-api
        run: bandit -r src/ -ll || true

      - name: Check dependencies for vulnerabilities
        working-directory: backend-api/kdp-creator-api
        run: safety check --file requirements.txt || true

  build:
    runs-on: ubuntu-latest
    name: Build Check
    needs: [ lint, security ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend-api/kdp-creator-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        working-directory: backend-api/kdp-creator-api
        run: python -m py_compile src/main.py

      - name: Check syntax
        working-directory: backend-api/kdp-creator-api
        run: python -m py_compile src/**/*.py || true
