name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web-dashboard/**'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web-dashboard/**'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'web-dashboard/kdp-creator-dashboard/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: web-dashboard/kdp-creator-dashboard
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: web-dashboard/kdp-creator-dashboard
        run: pnpm lint || true

      - name: Type check with TypeScript
        working-directory: web-dashboard/kdp-creator-dashboard
        run: pnpm type-check || true

  test:
    runs-on: ubuntu-latest
    name: Playwright E2E Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm test:chromium
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    name: Build Check
    needs: [ lint, test ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'web-dashboard/kdp-creator-dashboard/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: web-dashboard/kdp-creator-dashboard
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web-dashboard/kdp-creator-dashboard
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web-dashboard/kdp-creator-dashboard/dist/
          retention-days: 7
